<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" role="img" aria-label="Schematic map of Solemn Needles">
  <defs>
    <radialGradient id="snMist" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#c8a042" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#c8a042" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c8a042" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="snVig" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#0e1014" stop-opacity="0"/>
      <stop offset="100%" stop-color="#070809" stop-opacity="0.9"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="700" fill="#0e1014"/>

  <!-- terrain regions -->
  <path d="M0 470 L230 410 L470 470 L690 420 L1000 480 L1000 700 L0 700 Z" fill="#13161c"/>
  <path d="M0 250 L180 300 L380 250 L560 300 L760 250 L1000 300 L1000 470 L690 420 L470 470 L230 410 L0 470 Z" fill="#15191f" opacity="0.7"/>

  <!-- mist bloom -->
  <ellipse cx="500" cy="300" rx="560" ry="300" fill="url(#snMist)"/>
  <ellipse cx="760" cy="200" rx="240" ry="150" fill="#7fa8a3" opacity="0.05"/>

  <!-- contour lines -->
  <g stroke="#c8a042" stroke-opacity="0.08" fill="none" stroke-width="1">
    <ellipse cx="500" cy="330" rx="430" ry="210"/>
    <ellipse cx="500" cy="330" rx="300" ry="150"/>
    <ellipse cx="500" cy="330" rx="170" ry="90"/>
  </g>

  <!-- needle spires -->
  <g fill="#20242d" stroke="#c8a042" stroke-opacity="0.22" stroke-width="1.2">
    <path d="M300 300 L320 90 L340 300 Z"/>
    <path d="M350 320 L378 140 L402 320 Z"/>
    <path d="M410 300 L430 170 L450 300 Z"/>
    <path d="M640 330 L665 150 L690 330 Z"/>
    <path d="M700 320 L724 110 L744 320 Z"/>
    <path d="M150 470 L168 360 L188 470 Z"/>
    <path d="M820 470 L842 330 L862 470 Z"/>
  </g>

  <!-- fate-thread route -->
  <path d="M120 600 C 300 540, 360 470, 500 470 S 760 430, 900 360"
        fill="none" stroke="#c8a042" stroke-opacity="0.35" stroke-width="1.4" stroke-dasharray="5 9"/>

  <!-- compass -->
  <g transform="translate(910 90)" stroke="#c8a042" stroke-opacity="0.5" fill="none" stroke-width="1.2">
    <circle r="20"/>
    <path d="M0 -26 L0 26 M-26 0 L26 0" stroke-opacity="0.3"/>
    <path d="M0 -16 L5 0 L0 16 L-5 0 Z" fill="#c8a042" fill-opacity="0.5" stroke="none"/>
  </g>
  <text x="910" y="52" fill="#c8a042" fill-opacity="0.6" font-family="monospace" font-size="13" text-anchor="middle">N</text>

  <rect width="1000" height="700" fill="url(#snVig)"/>
</svg>
