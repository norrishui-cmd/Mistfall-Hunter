<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" role="img" aria-label="Schematic map of Hallowgrove">
  <defs>
    <radialGradient id="hgMist" cx="48%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#c8a042" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#c8a042" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c8a042" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hgClear" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c2128" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0e1014" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hgVig" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#0e1014" stop-opacity="0"/>
      <stop offset="100%" stop-color="#070809" stop-opacity="0.9"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="700" fill="#0e1014"/>

  <!-- river / path of mist -->
  <path d="M-20 240 C 200 300, 300 360, 520 360 S 820 300, 1020 380 L1020 460 C 820 380, 700 440, 520 440 S 180 400, -20 340 Z"
        fill="#12161c" opacity="0.8"/>

  <!-- central clearing -->
  <ellipse cx="470" cy="300" rx="220" ry="150" fill="url(#hgClear)"/>

  <!-- mist bloom -->
  <ellipse cx="480" cy="280" rx="540" ry="300" fill="url(#hgMist)"/>

  <!-- grove canopy clusters -->
  <g fill="#171c18" stroke="#86b0ab" stroke-opacity="0.12" stroke-width="1">
    <g>
      <circle cx="180" cy="150" r="48"/><circle cx="230" cy="180" r="40"/><circle cx="150" cy="200" r="36"/><circle cx="210" cy="120" r="30"/>
    </g>
    <g>
      <circle cx="800" cy="160" r="50"/><circle cx="850" cy="200" r="42"/><circle cx="760" cy="200" r="34"/><circle cx="820" cy="120" r="30"/>
    </g>
    <g>
      <circle cx="150" cy="540" r="50"/><circle cx="200" cy="560" r="40"/><circle cx="110" cy="500" r="34"/>
    </g>
    <g>
      <circle cx="780" cy="540" r="52"/><circle cx="830" cy="500" r="40"/><circle cx="740" cy="560" r="36"/><circle cx="850" cy="560" r="28"/>
    </g>
    <g>
      <circle cx="470" cy="580" r="46"/><circle cx="520" cy="560" r="36"/><circle cx="430" cy="560" r="30"/>
    </g>
  </g>

  <!-- contour rings around clearing -->
  <g stroke="#c8a042" stroke-opacity="0.07" fill="none" stroke-width="1">
    <ellipse cx="470" cy="300" rx="300" ry="200"/>
    <ellipse cx="470" cy="300" rx="180" ry="120"/>
  </g>

  <!-- fate-thread trail -->
  <path d="M140 360 C 280 320, 360 300, 470 300 S 680 320, 820 360"
        fill="none" stroke="#c8a042" stroke-opacity="0.32" stroke-width="1.4" stroke-dasharray="5 9"/>

  <!-- compass -->
  <g transform="translate(910 600)" stroke="#c8a042" stroke-opacity="0.5" fill="none" stroke-width="1.2">
    <circle r="20"/>
    <path d="M0 -26 L0 26 M-26 0 L26 0" stroke-opacity="0.3"/>
    <path d="M0 -16 L5 0 L0 16 L-5 0 Z" fill="#c8a042" fill-opacity="0.5" stroke="none"/>
  </g>
  <text x="910" y="562" fill="#c8a042" fill-opacity="0.6" font-family="monospace" font-size="13" text-anchor="middle">N</text>

  <rect width="1000" height="700" fill="url(#hgVig)"/>
</svg>
